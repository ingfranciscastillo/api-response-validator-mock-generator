minimumReleaseAge: 1440
strictDepBuilds: true
blockExoticSubdeps: true
trustPolicy: no-downgrade

trustPolicyExclude:
  - semver

onlyBuiltDependencies:
  - esbuild
  - inngest
  - inngest-cli

overrides:
  "esbuild": "0.28.1"
  "dompurify": "3.4.11"
  "@types/node": "26.0.0"
  "undici-types": "8.3.0"